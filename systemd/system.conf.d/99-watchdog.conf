[Manager]
# System-level hardware watchdog: if the kernel hangs entirely, the Pi reboots.
# Requires dtparam=watchdog=on in /boot/firmware/config.txt (see setup_pi_service.sh).
# This works independently of any service — systemd pets /dev/watchdog every 15s.
# If systemd itself freezes (kernel panic, full lock-up), the Pi reboots automatically.
RuntimeWatchdogSec=15s
RebootWatchdogSec=10min
