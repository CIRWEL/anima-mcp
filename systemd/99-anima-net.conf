# Network tuning for Lumen / anima-mcp on Raspberry Pi
# Reduces TCP connection burst impact on brcmfmac WiFi firmware during service restarts.
#
# Install: cp this file to /etc/sysctl.d/99-anima-net.conf && sysctl --system

# Cut TIME_WAIT from 60s → 15s: closed connections clear faster,
# fewer half-dead sockets pile up on the WiFi chip during restarts.
net.ipv4.tcp_fin_timeout = 15

# Allow TIME_WAIT sockets to be reused for new connections immediately.
# Reduces the number of simultaneous socket states the chip tracks.
net.ipv4.tcp_tw_reuse = 1

# Smaller SYN backlog: limits how many pending connections queue up
# at once, smoothing out connection bursts.
net.ipv4.tcp_max_syn_backlog = 128
